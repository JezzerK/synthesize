<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Graphemeâ†’Color Options</title>
    <style>
      body { font-family: system-ui, sans-serif; padding: 16px; max-width: 840px; }
      .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 6px; margin-bottom: 8px; }
      input[type="color"] { width: 40px; height: 28px; border: none; background: none; }
      .row { margin: 12px 0; }
      textarea { width: 100%; height: 120px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      label { display: flex; align-items: center; gap: 8px; }
      .pill { padding: 2px 8px; border: 1px solid #ddd; border-radius: 12px; margin-right: 6px; }
      small { color: #666; }
      button { padding: 6px 10px; }
    </style>
  </head>
  <body>
    <h1>Graphemeâ†’Color Settings</h1>
    <section class="row">
      <label><input type="checkbox" id="useWhitelist"> Use whitelist mode (block all except allowed)</label>
      <p><small>Patterns supported: <code>example.com</code>, <code>*.example.com</code>, <code>.example.com</code>. One per line.</small></p>
    </section>

    <section class="row">
      <h3>Whitelist</h3>
      <textarea id="whitelistBox" placeholder="example.com&#10;*.mysite.org"></textarea>
      <div><button id="saveWL">Save whitelist</button> <span id="wlStatus"></span></div>
    </section>

    <section class="row">
      <h3>Blacklist</h3>
      <textarea id="blacklistBox" placeholder="heavy-app.com&#10;*.mail.example"></textarea>
      <div><button id="saveBL">Save blacklist</button> <span id="blStatus"></span></div>
    </section>

    <hr/>

    <h2>Graphemeâ†’Color Mapping</h2>
    <p>Choose a color for each letter/number. Changes save to Chrome Sync.</p>

    <h3>Letters</h3>
    <div id="letters" class="grid"></div>

    <h3>Digits</h3>
    <div id="digits" class="grid"></div>

    <div class="row"><button id="saveMap">Save mapping</button> <span id="mapStatus"></span></div>

    <script src="options.js"></script>
  </body>
</html>
