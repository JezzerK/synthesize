<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Grapheme‚ÜíColor</title>
    <style>
      body { font-family: system-ui, sans-serif; padding: 12px; min-width: 260px; }
      label { display: flex; align-items: center; gap: 8px; }
      .row { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
      button { padding: 6px 8px; }
      small { color: #666; }
    </style>
  </head>
  <body>
    <label>
      <input type="checkbox" id="toggle">
      Enable globally
    </label>

    <div class="row">
      <strong id="host"></strong>
      <span id="hostStatus"></span>
    </div>
    <div class="row">
      <button id="allowBtn">Allow on this site</button>
      <button id="blockBtn">Block on this site</button>
      <button id="clearBtn">Clear override</button>
    </div>

    <p class="row">
      <a href="#" id="openOptions">Edit mapping & lists‚Ä¶</a>
    </p>
    <p><small>Tip: whitelist mode lives in Options.</small></p>

    <script src="popup.js"></script>
  </body>
</html>
