<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Graphemeâ†’Color Options</title>
    <style>
      body { font-family: system-ui, sans-serif; padding: 16px; max-width: 720px; }
      table { border-collapse: collapse; }
      th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: center; }
      input[type="color"] { width: 40px; height: 28px; border: none; background: none; }
      .row { display: grid; grid-template-columns: repeat(13, 1fr); gap: 6px; margin-bottom: 8px; }
      .save { margin-top: 12px; }
    </style>
  </head>
  <body>
    <h1>Graphemeâ†’Color Mapping</h1>
    <p>Choose a color for each letter/number. Changes are saved to your Chrome profile (sync).</p>

    <h3>Letters</h3>
    <div id="letters" class="row"></div>

    <h3>Digits</h3>
    <div id="digits" class="row"></div>

    <button class="save" id="saveBtn">Save</button>
    <span id="status" style="margin-left:8px;"></span>

    <script src="options.js"></script>
  </body>
</html>
